{% extends "base.html" %}
{% block title %}{{ action }} Vehicle{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <a href="{% url 'my_vehicles' %}" style="font-size:0.875rem;color:#888;">← My Vehicles</a>
    <h1 style="margin-top:4px;">{{ action }} Vehicle</h1>
  </div>
</div>
<div class="page-body" style="max-width:480px;">
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}<div class="form-error">{{ field.errors.0 }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="flex gap-3">
          <button type="submit" class="btn btn-cta btn-lg" id="vehicle-form-submit-btn">{{ action }} Vehicle</button>
          <a href="{% url 'my_vehicles' %}" class="btn btn-ghost btn-lg">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
